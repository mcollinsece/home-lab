# Traefik DYNAMIC TLS configuration (loaded by the file provider).
# Defines the wildcard cert for *.lab.lan — generated by mkcert.
#
# Regenerate cert (expires 2028-09-13):
#   CAROOT=traefik/certs/ca mkcert \
#     -cert-file traefik/certs/_wildcard.lab.lan.pem \
#     -key-file  traefik/certs/_wildcard.lab.lan-key.pem \
#     "*.lab.lan"
#
# CA cert for browser trust: traefik/certs/ca/rootCA.pem
# Install on each client machine — see traefik/README.md.

tls:
  stores:
    default:
      defaultCertificate:
        certFile: /etc/traefik/certs/_wildcard.lab.lan.pem
        keyFile:  /etc/traefik/certs/_wildcard.lab.lan-key.pem
  certificates:
    - certFile: /etc/traefik/certs/_wildcard.lab.lan.pem
      keyFile:  /etc/traefik/certs/_wildcard.lab.lan-key.pem
