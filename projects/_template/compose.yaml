# Docker Compose template — the PREFERRED way to run a service here.
# Copy this dir:   cp -r projects/_template projects/<name>
# Rename service:  replace `myapp` below with your service name.
# Start:           docker compose -f ~/home-lab/projects/<name>/compose.yaml up -d
#                  (or add it as an include: in docker/compose.yml for managed startup)
services:
  myapp:
    image: docker.io/library/nginx:1.27   # pin a tag — never :latest
    container_name: myapp                  # → hostname becomes myapp.lab.lan (Traefik defaultRule)
    networks: [ai-net]
    # env_file: ./myapp.env                # real secrets, gitignored
    restart: unless-stopped
    labels:
      # All most services need — hostname derived from container_name:
      - traefik.enable=true
      # Uncomment ONLY if the app's internal port isn't 80:
      # - traefik.http.services.myapp.loadbalancer.server.port=8080
      # Custom host instead of the name-derived default:
      # - traefik.http.routers.myapp.rule=Host(`custom.lab.lan`)

networks:
  # Reuse the shared bridge Traefik watches (created by docker/compose.yml).
  # `external: true` means this compose file attaches to it rather than creating its own.
  ai-net:
    external: true
